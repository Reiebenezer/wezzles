<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wezzles</title>
  <link rel="icon" href="src/assets/logo.ico" />

  <link rel="stylesheet" href="src/style.css">
  <link rel="stylesheet" href="src/properties.css">

  <script type="module" src="/src/external-styles.ts"></script>

</head>

<body>
  <main>
    <div id="wz-categories">
      
    </div>
    <div id="wz-options">

    </div>
    
    <div id="wz-playground" data-id="global-container">
      <i id="wz-delete-icon" class="ph ph-trash"></i>
      <div id="wz-shift-animation"></div>
      <div id="wz-resize-animation"></div>
      <div id="wz-insert-animation"></div>
    </div>


    <aside>
      <iframe src="preview.html" frameborder="0" id="wz-preview"></iframe>
      <div id="wz-properties">
        <label id="wz-property-text-content">Text Content<textarea type="text" rows="5"></textarea></label>
        <div id="wz-property-style">
          <label id="wz-property-style-name">Style Name<input type="text"></label>
          <label id="wz-property-style-value">Style Value<input type="text"></label>
        </div>
        <label id="wz-property-placeholder">Placeholder<input type="text"></label>
        <label id="wz-property-value">Initial Value<input type="text"></label>
      </div>
    </aside>

    <svg id="wz-arrow">
      <path d="" fill="transparent"/>
      <g transform="translate(-1000, -1000)">
        <path d="M0 -10 L-10 0 L0 10 Z"/>
      </g>
    </svg>
  </main>



  <script type="module" src="/src/main.ts"></script>
</body>

</html>
